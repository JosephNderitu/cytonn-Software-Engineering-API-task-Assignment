name: CI/CD — Build, Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1: Code Quality & Tests
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: task_manager_test
          POSTGRES_USER: task_user
          POSTGRES_PASSWORD: secret123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo, pdo_pgsql, mbstring, xml, bcmath, gd
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: src/vendor
          key: composer-${{ hashFiles('src/composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        working-directory: src
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy .env for testing
        working-directory: src
        run: |
          cp .env .env.testing 2>/dev/null || true
          echo "APP_ENV=testing" >> .env
          echo "APP_KEY=base64:$(openssl rand -base64 32)" >> .env
          echo "DB_CONNECTION=pgsql" >> .env
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_PORT=5432" >> .env
          echo "DB_DATABASE=task_manager_test" >> .env
          echo "DB_USERNAME=task_user" >> .env
          echo "DB_PASSWORD=secret123" >> .env

      - name: Run migrations
        working-directory: src
        run: php artisan migrate --force

      - name: Run PHPUnit tests
        working-directory: src
        run: php artisan test --stop-on-failure

      - name: Check route list (smoke test)
        working-directory: src
        run: php artisan route:list

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2: Build Docker image
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (verify it compiles)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/php/Dockerfile.prod
          push: false
          tags: task-manager-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 3: Deploy to Render
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render deploy
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -d '{"clearCache": false}' | jq .

      - name: Wait for deploy to complete
        run: |
          echo "Deploy triggered. Render will build and deploy automatically."
          echo "Monitor at: https://dashboard.render.com"

      - name: Notify success
        run: |
          echo "✅ Deployed successfully to Render"
          echo "Commit: ${{ github.sha }}"
          echo "By: ${{ github.actor }}"