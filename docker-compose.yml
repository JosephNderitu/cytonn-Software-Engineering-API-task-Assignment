
services:

  # ─── PHP-FPM Application ───────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: task_api_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./src:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - task_network
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - APP_ENV=local

  # ─── PostgreSQL Database ───────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: task_api_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: task_manager
      POSTGRES_USER: task_user
      POSTGRES_PASSWORD: secret123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - task_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U task_user -d task_manager"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Nginx Web Server ──────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: task_api_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - task_network
    depends_on:
      - app

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  task_network:
    driver: bridge